name: Bug Report
description: Report a bug in Claude Video
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `/video edit`
        2. Provide input file
        3. Error appears
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the full error message
      render: shell

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"

  - type: input
    id: ffmpeg
    attributes:
      label: FFmpeg version
      placeholder: "6.1.1"
