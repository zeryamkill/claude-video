name: Feature Request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: What would you like to see added?
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: How would you use this feature?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editing
        - Transcoding
        - Captioning
        - Analysis
        - AI Generation
        - Stock Footage / Promo
        - Audio
        - Enhancement
        - Export
        - Other
