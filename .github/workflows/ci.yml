name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python scripts
        run: |
          find scripts promo-pipeline/scripts -name '*.py' -exec python3 -m py_compile {} +

  check-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          find scripts -name '*.sh' -exec bash -n {} +

  check-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path '*/node_modules/*' -exec python3 -c "import json,sys; json.load(open(sys.argv[1]))" {} +

  check-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No em dashes in docs
        run: |
          ! grep -rn '—' --include='*.md' --include='*.json' .
